<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Branch</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="stylesheet" href="css/login.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Container centralizado -->
   <div id="login" class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card p-4" style="max-width: 440px; width: 100%; margin: auto;">
  <div class="card-body p-5">
  <div class="text-center mb-4">
  <h2 class="gold-text fw-bold">
    <i class="fas fa-calendar-alt me-2"></i>Agenda Dourada           
  </h2>
  <p class="text-muted">Facilite sua vida com o nossa Agenda Dourada</p>

  </div> <!-- fim text-center -->

    <!-- navegação abas -->
  <div class="d-flex justify-content-center mb-4" role="tablist">
    <button type="button" class="btn-abas me-2 active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" role="tab">Login</button>
    <button type="button" class="btn-abas me-2" id="cadastro-tab" data-bs-toggle="tab" data-bs-target="#cadastro-pane" role="tab">Cadastro</button>
</div>

   <!-- Formulário de Login -->
  <div class="tab-content" id="authTabsContent">

    <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
   <div id="form-login">
    <div class="mb-3">
      <input type="email" class="form-control" id="email" placeholder="Email">
    </div>
    <div class="mb-3">
      <input type="password" class="form-control" id="password" placeholder="Senha">
    </div>
    <button onclick="loginEmail()" class="btn-entrar w-100 py-2 mb-3">
      Entrar
    </button>
   </div> <!-- fim form-login -->
  

   <div class="d-flex align-items-center my-4">
        <hr class="flex-grow-1"><span class="mx-2 text-muted small">ou</span><hr class="flex-grow-1">
      </div>
      <button type="button" id="google-login" class="btn-google  w-100 d-flex align-items-center justify-content-center gap-2 py-2">
        <img src="img/google-logo.png"  alt="Google Logo" width="40">
        Continuar com Google
      </button>
    </div>
    
    

    <!--Cadastro (Segundo formulário)-->
    <div class="tab-pane fade" id="cadastro-pane" role="tabpanel">
    <div id="form-cadastro">
    <div class="mb-3">
      <input type="text" id="register-name" class="form-control" placeholder="Nome e Sobrenome" required>
    </div>

    <div class="mb-3">
    <input type="email" id="register-email" class="form-control" placeholder="E-mail" required>
    </div>

    <div class="mb-3">
    <input type="password" id="register-password" class="form-control" placeholder="Senha (mín. 6 caracteres)" required>
    </div>
    
    <div class="mb-4">
    <input type="password" id="register-confirm-password" class="form-control" placeholder="Confirmar Senha" required>
    </div>

    <button onclick="registerEmail()" class="btn-cadastro w-100 py-2 mb-3">
    Criar Conta
    </button>
    </div> <!--fim form-cadastro-->
    </div>
    </div>
   

    
</div> <!-- fim card-body -->
</div> <!-- fim card -->
</div> <!-- fim div login-->





<script type ="module" src="js/firebase-config.js"></script>
<script type="module" src="js/login.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
