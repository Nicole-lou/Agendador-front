<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="stylesheet" href="css/login.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-light-gray">

    <main class="container d-flex align-items-center justify-content-center vh-100">
    <div class="row w-100 justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow-lg border-1-rounded">
    <div class="card-body p-5">
    <h2 class="text-center mb-4 gold-text">Seja bem-vindo!
        Ao nosso espaço
    </h2>

    <form id="login-form">
    <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control custom-input" id="email" required placeholder="Seu@email.com">
    </div>

    <div class="mb-3">
    <label for="password" class="form-label">Senha</label>
    <input type="password" class="form-control custom-input" id="password" required placeholder="*******">
    </div>

    <button type="submit" class="btn btn-gold w-100 mt-3 fw-bold">Entrar</button>
    </form> <!-- Form end here -->

    <div class="d-flex align-items-center my-4">
    <hr class="flex-grow-1">
    <span class="mx-2 text-muted small">ou</span>
    <hr class="flex-grow-1">
    </div>

   <button type="button" id="google-login" class="btn w-100 d-flex align-items-center justify-content-center gap-2 py-2">
   <img src="img/google-logo.png" alt="Google Logo" width="40">
    Continuar com Google
   </button>

    <div class="text-center mt-4">
    <p class="text-ad">Não tem conta? <a href="#" class="text-black fw-bold text-decoration-none">Cadastre-se</a></p>
    </div>
    </div>
    </div>
    </div>
    </div>
    </main> <!-- Main content end here -->
    










<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/login.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
